<body>
    <style>
        .window {
            width: 600px;
            height: 120px;
            background-color: rgb(192, 187, 187);
            border-color: black;
            border-width: 10px;
            display: flex;
            gap: 1px;
            align-items: end;
        }

        .rectangle {
            width: 60px;
            height: 100px;
            background-color: rgb(245, 245, 246);
            border-color: black;
            border-width: 1px;
            border-style: solid;
        }
    </style>

    <h3>Bubble sort, fisher-yates shuffle</h3>
    <div id="bubble" class="window"></div>


    <script>
        const bubble = document.getElementById("bubble");
        let numbers = [5, 2, 4, 9, 7, 8, 6, 1, 3];

        updateView()
        function updateView() {
            bubble.innerHTML = /*HTML*/`
            <button onclick="sort(numbers)">sort</button>
            <button onclick="shuffle()">shuffle</button>
            ${visualizeSort()}
        `
    }


    function sort(unsorted) {
        let sorted = true

        for (let i = 0; i < unsorted.length - 1; i++) {
            if (unsorted[i] > unsorted[i + 1]) {
                [unsorted[i], unsorted[i + 1]] = [unsorted[i + 1], unsorted[i]];
                updateView();
                sorted = false;
            }
        }

        if (!sorted) sort(unsorted)
    }
    function visualizeSort() {
        let html = "";
        for (let i = 0; i < numbers.length; i++) {
            html += /*HTML*/ `<div style="height: ${numbers[i] * 13}px" class="rectangle"></div>`
        }
        return html;
    }


    function shuffle() {
        let toShuffle = numbers.slice()
        let shuffled = []
        for(let i = 0 ; i < numbers.length; i++){
            let n = toShuffle[Math.floor(Math.random() * toShuffle.length)]
            let index = toShuffle.indexOf(n)

            shuffled.push(n) 
            toShuffle.splice(index,1)
        }
        numbers = shuffled
        updateView()
    }

    function timeout() {
        const time = setTimeout(() => {
            
        }, 100);
    }
