<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Algorithm visualization</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h3>Bubble sort (30ms), fisher-yates shuffle</h3>
		<div id="bubble" class="window"></div>

		<h3>distracted sort (30ms), fisher-yates shuffle</h3>
		<div id="distracted" class="window"></div>

		<h3>Cocktail sort (30ms), fisher-yates shuffle</h3>
		<div id="cocktail" class="window"></div>

		<button onclick="sortAll()">sort all</button>
		<button onclick="shuffleAll()">shuffle all</button>

		<script src="model.js" defer></script>
		<script src="view.js" defer></script>
		<script src="controller.js" defer></script>

	</body>
